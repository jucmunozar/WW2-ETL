services:
  postgres:
    image: postgres:16-alpine
    container_name: ww2_postgres
    environment:
      POSTGRES_DB: ww2_db
      POSTGRES_USER: ww2_user
      POSTGRES_PASSWORD: ww2_secret
    ports:
      - "5432:5432"
    volumes:
      - ww2_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ww2_user -d ww2_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ww2_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ww2etl.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - ./pgadmin-servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  ww2_pgdata:
